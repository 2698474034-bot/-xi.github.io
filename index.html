<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邱xi - 产品经理 | 个人作品集</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    :root {
      --bg-primary: #000000;
      --bg-secondary: #000000;
      --bg-tertiary: #000000;
      --text-primary: #ececf1;
      --text-secondary: #90909e;
      --text-tertiary: #68687a;
      --accent: #22d3ee;
      --accent-light: #67e8f9;
      --accent-dark: #0891b2;
      --border: #252536;
      --border-light: #1a1a2a;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
      --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.6);
      --glow: 0 0 20px rgba(34, 211, 238, 0.25);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --transition-fast: 0.15s ease;
      --transition-base: 0.25s ease;
      --transition-slow: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      /* PillNav 组件变量 */
      --nav-h: 42px;
      --pill-pad-x: 18px;
      --pill-gap: 3px;
      --base: #ffffff;
      --pill-bg: #000000;
      --pill-text: #ffffff;
      --hover-text: #000000;
    }
    .hero-section { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .hero-centered { text-align: center; position: relative; z-index: 2; cursor: default; }
    .hero-centered h1 { font-size: 64px; font-weight: 800; letter-spacing: 4px; color: #ffffff; margin-bottom: 16px; line-height: 1.2; }
    .hero-centered h1 .hero-char {
      display: inline-block;
    }
    .hero-centered .hero-sub { font-size: 20px; font-weight: 300; color: rgba(255,255,255,0.6); letter-spacing: 6px; text-transform: uppercase; }
    .hero-glow { position: fixed; width: 120px; height: 120px; border-radius: 50%; pointer-events: none; z-index: 99999; background: radial-gradient(circle at center, rgba(255, 220, 180, 0.9) 0%, rgba(255, 180, 120, 0.4) 15%, rgba(255, 140, 80, 0.15) 30%, transparent 55%); margin-left: -60px; margin-top: -60px; will-change: top, left, opacity; mix-blend-mode: plus-lighter; opacity: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; background: #000000; }
    body { background: #000000; display: flex; flex-direction: column; min-height: 100dvh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text-primary);
      
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
     overflow-x: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar {
      display: none;
    }
    .tech-grid {
      position: fixed;
      inset: 0;
      z-index: -10;
      background-image: 
        linear-gradient(rgba(34, 211, 238, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34, 211, 238, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }
    .particles {
      position: fixed;
      inset: 0;
      z-index: -9;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.3;
      animation: float var(--duration) ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      50% { transform: translateY(-20px) translateX(10px); opacity: 0.6; }
    }
    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: -8;
      animation: orbFloat 15s ease-in-out infinite;
    }
    .glow-orb-1 { width: 400px; height: 400px; background: #22d3ee; top: 20%; left: 10%; }
    .glow-orb-2 { width: 300px; height: 300px; background: #0891b2; top: 60%; right: 10%; animation-delay: -5s; }
    .glow-orb-3 { width: 250px; height: 250px; background: #2dd4bf; bottom: 10%; left: 40%; animation-delay: -10s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }
   /* ===== 顶部导航 ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all var(--transition-base);
      border-bottom: 1px solid transparent;
    }
    .header.scrolled {
      background: rgba(10, 10, 15, 0.95);
      border-bottom-color: var(--border);
      box-shadow: 0 1px 20px rgba(0, 0, 0, 0.3);
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 64px;
      position: relative;
    }
    .nav-left {
      position: absolute;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
    }
    .nav-right {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
    }
    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(255, 200, 150, 0.4));
    }
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .pill-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      gap: 8px;
    }
    /* ---- PillNav 核心 ---- */
    .pill-list {
      list-style: none;
      display: flex;
      align-items: center;
      gap: 3px;
      margin: 0;
      padding: 3px;
      height: var(--nav-h);
      background: var(--base);
      border-radius: 9999px;
    }
    .pill-list>li {
      display: flex;
      height: 100%;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0 var(--pill-pad-x);
      background: var(--pill-bg);
      color: var(--pill-text);
      text-decoration: none;
      border-radius: 9999px;
      border: none;
      box-sizing: border-box;
      font-weight: 600;
      font-size: 16px;
      line-height: 1;
      letter-spacing: 0.2px;
      white-space: nowrap;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background-color 0.15s ease, color 0.15s ease, box-shadow 0.3s ease;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .pill .hover-circle {
      position: absolute;
      left: 50%;
      bottom: 0;
      border-radius: 50%;
      background: var(--base);
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      will-change: transform;
    }
    .pill .label-stack {
      position: relative;
      display: inline-block;
      line-height: 1;
      z-index: 2;
      overflow: hidden;
      height: 1em;
    }
    .pill .pill-label {
      position: relative;
      z-index: 2;
      display: block;
      line-height: 1;
      will-change: transform;
    }
    .pill .pill-label-hover {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      line-height: 1;
      color: var(--hover-text);
      will-change: transform, opacity;
    }
    /* ===== 选中状态（核心高亮） ===== */
    .pill.is-active {
      background: var(--base) !important;
      color: #000000 !important;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15), inset 0 0 20px rgba(255, 255, 255, 0.05);
    }
    /* 底部指示圆点 */
    .pill.is-active::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 12px;
      height: 12px;
      background: #000000;
      border-radius: 50px;
      z-index: 4;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,
      100% {
        transform: translateX(-50%) scale(1);
        opacity: 1;
      }
      50% {
        transform: translateX(-50%) scale(0.8);
        opacity: 0.7;
      }
    }
    .pill:active {
      transform: scale(0.95);
      transition: transform 0.08s;
    }
    /* 联系按钮 */
    .nav-contact-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      background: transparent;
      color: rgba(255, 255, 255, 0.8);
      border-radius: 50%;
      text-decoration: none;
      transition: all var(--transition-base);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
    }
    .nav-contact-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      transform: scale(1.1);
      border-color: rgba(255, 255, 255, 0.4);
    }
        .nav-contact-btn:active {
      transform: scale(0.92);
    }
    /* 自定义圆角 tooltip */
    .nav-contact-btn {
      position: relative;
    }
    .nav-contact-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform-origin: top center;
    }
    .nav-contact-btn:hover::after {
      opacity: 1;
    }
    .hero-content { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; width: 100%; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(34, 211, 238, 0.1); border: 1px solid rgba(34, 211, 238, 0.3); border-radius: var(--radius-full); font-size: 14px; color: var(--accent-light); margin-bottom: 32px; animation: fadeInUp 0.6s ease; }
    .badge-dot { width: 6px; height: 6px; background: #2dd4bf; border-radius: 50%; animation: pulse 2s ease-in-out infinite; box-shadow: 0 0 8px #2dd4bf; }
    .hero-title { font-size: 56px; font-weight: 800; line-height: 1.1; letter-spacing: -2px; margin-bottom: 24px; animation: fadeInUp 0.6s ease 0.1s both; }
    .title-line { display: block; color: var(--text-primary); }
    .title-highlight { display: block; background: linear-gradient(135deg, var(--accent), #0891b2, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; background-size: 200% 200%; animation: gradientShift 4s ease infinite; }
    @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .hero-description { font-size: 18px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 32px; max-width: 500px; animation: fadeInUp 0.6s ease 0.2s both; }
    .hero-actions { display: flex; gap: 16px; margin-bottom: 48px; animation: fadeInUp 0.6s ease 0.3s both; }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--accent); color: white; border: none; border-radius: var(--radius-full); font-size: 16px; font-weight: 600; cursor: pointer; transition: all var(--transition-base); box-shadow: 0 0 20px rgba(34, 211, 238, 0.3); position: relative; overflow: hidden; }
    .btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: translateX(-100%); transition: transform 0.5s ease; }
    .btn-primary:hover::before { transform: translateX(100%); }
    .btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 0 30px rgba(34, 211, 238, 0.5); }
    .btn-arrow { transition: transform var(--transition-base); }
    .btn-primary:hover .btn-arrow { transform: translateX(4px); }
    .hero-stats { display: flex; gap: 48px; animation: fadeInUp 0.6s ease 0.4s both; }
    .stat-item { display: flex; flex-direction: column; }
    .stat-number { font-size: 32px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; text-shadow: 0 0 20px rgba(34, 211, 238, 0.3); }
   .stat-label { font-size: 14px; color: var(--text-tertiary); margin-top: 4px; }
    .hero-visual { animation: fadeIn 0.8s ease 0.3s both; display: flex; align-items: center; justify-content: center; }
    /* Stack 组件样式 */
    .stack-container {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 600px;
    }
    .stack-card {
      position: absolute;
      width: 100%;
      height: 100%;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .stack-card:active { cursor: grabbing; }
    .stack-card-inner {
      width: 100%;
      height: 100%;
      border-radius: 1rem;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 30px rgba(34,211,238,0.1);
      border: 1px solid var(--border);
    }
    .stack-card-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      -webkit-user-drag: none;
    }
   .projects-section { padding: 120px 0; position: relative; }
    
    .section-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 64px; }
    .projects-section .section-header { justify-content: center; text-align: center; }
    .section-label { display: inline-block; font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
    .section-title { font-size: 40px; font-weight: 800; color: var(--text-primary); letter-spacing: -1px; margin-bottom: 8px; }
    .section-subtitle { font-size: 16px; color: var(--text-secondary); }
    .about-section { padding: 120px 0; position: relative; flex: 1; }
    .about-header { text-align: center; margin-bottom: 64px; }
    .footer { margin-top: auto; background: var(--bg-secondary); color: var(--text-primary); padding: 48px 0 32px; border-top: 1px solid var(--border); }
    .footer-container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .footer-main { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .footer-brand { display: flex; align-items: center; gap: 16px; }
    .footer-logo { font-size: 18px; font-weight: 700; color: var(--text-primary); }
    .footer-tagline { font-size: 13px; color: var(--text-secondary); }
    .footer-actions { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .footer-contact-item { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); text-decoration: none; transition: color var(--transition-fast); }
    .footer-contact-item svg { flex-shrink: 0; }
    .footer-contact-item:hover { color: var(--accent-light); }
    .toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: #fff; padding: 16px 32px; border-radius: 12px; font-size: 15px; z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; backdrop-filter: blur(8px); display: inline-flex; align-items: center; gap: 12px; white-space: nowrap; }
    .toast.show { opacity: 1; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
   @keyframes galleryFloat {
       0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
       50% { transform: translateY(-7px) scale(1.02); box-shadow: 0 16px 40px rgba(34, 211, 238, 0.15); }
   }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; }}
    @media (max-width: 1024px) { .hero-content { grid-template-columns: 1fr; gap: 48px; } .hero-visual { display: none; } .hero-title { font-size: 44px; } .footer-main { flex-direction: column; text-align: center; gap: 16px; }}
    @media (max-width: 768px) {  .hero-title { font-size: 36px; } .section-header { flex-direction: column; align-items: flex-start; gap: 24px; } .section-title { font-size: 32px; } }
    @media (max-width: 768px) { .projects-section .section-header { align-items: center; } }
  
.progress-bar {
  position: fixed;
  top: 64px;
  left: 0;
  width: 0;
  height: 3px;
  background: linear-gradient(90deg, rgba(255, 230, 200, 0.85) 0%, rgba(255, 210, 170, 0.3) 40%, rgba(255, 200, 150, 0.05) 80%, transparent 100%);
  z-index: 999;
  transition: width 0.1s ease;
  box-shadow: 0 0 12px rgba(255, 210, 170, 0.3), 0 0 25px rgba(255, 200, 150, 0.1);
  opacity: 0;
  transition: opacity 0.3s ease, width 0.1s ease;
}
.progress-bar.visible {
  opacity: 1;
}
    /* BorderGlow Effect */
.lanyard-overlay {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  display: none;
  cursor: pointer;
  opacity: 0;
  transform: translateY(-40px);
  transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1), transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.lanyard-overlay.visible {
  opacity: 1;
  transform: translateY(0);
}
.lanyard-overlay .lanyard-close {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.25);
  background: transparent;
  color: rgba(255,255,255,0.7);
  font-size: 22px;
  line-height: 40px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  z-index: 2;
}
.lanyard-overlay .lanyard-close:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border-color: rgba(255,255,255,0.4);
}
.lanyard-overlay .lanyard-hint {
  position: absolute;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.35);
  font-size: 14px;
  letter-spacing: 1px;
  pointer-events: none;
  z-index: 2;
}
.animals-section {
  position: relative;
  z-index: 1;
  padding: 60px 0 30px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 100px;
  overflow: hidden;
  flex-wrap: nowrap;
}
.animal-container {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
  overflow: visible;
  z-index: 1;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.animal-container:hover {
  z-index: 10;
  transform: scale(1.35);
}
.animal-container svg {
  transition: transform 0.3s ease;
}
/* ── Default idle animations (running continuously) ── */
/* 猫猫 — 优雅 sway */
#animal0 svg {
  animation: idleCat 2.4s ease-in-out infinite;
}
/* 狗狗 — 欢快 bounce */
#animal1 svg {
  animation: idleDog 1.6s ease-in-out infinite;
  animation-delay: -0.3s;
}
/* 鸟鸟 — 轻快 flutter */
#animal2 svg {
  animation: idleBird 1.2s ease-in-out infinite;
  animation-delay: -0.6s;
}
/* 兔兔 — 敏捷 hop */
#animal3 svg {
  animation: idleRabbit 0.9s ease-in-out infinite;
  animation-delay: -0.15s;
}
/* 熊熊 — 憨厚 rock */
#animal4 svg {
  animation: idleBear 2.8s ease-in-out infinite;
  animation-delay: -0.5s;
}
/* ── Hover: each animal gets a personality pop ── */
.animal-container:hover svg {
  animation: hoverPop 0.5s ease-in-out infinite alternate !important;
}
/* ── Idle keyframes ── */
@keyframes idleCat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  25% { transform: translateY(-4px) rotate(0deg); }
  50% { transform: translateY(-1px) rotate(3deg); }
  75% { transform: translateY(-6px) rotate(1deg); }
}
@keyframes idleDog {
  0%, 100% { transform: translateY(0) scale(1); }
  20% { transform: translateY(-6px) scale(1.08, 0.92); }
  40% { transform: translateY(-9px) scale(0.95, 1.05); }
  60% { transform: translateY(-3px) scale(1.02, 0.98); }
  80% { transform: translateY(-7px) scale(1.05, 0.95); }
}
@keyframes idleBird {
  0%, 100% { transform: translateY(0) scaleY(1); }
  25% { transform: translateY(-3px) scaleY(0.85); }
  50% { transform: translateY(-5px) scaleY(1.05); }
  75% { transform: translateY(-2px) scaleY(0.9); }
}
@keyframes idleRabbit {
  0%, 100% { transform: translateY(0) scale(1); }
  20% { transform: translateY(-3px) scale(1.08, 0.92); }

// 2. 导航高亮（点击 + 滚动自动同步）
    // ============================================================
    var _scrollLock = false;
    var _activeSection = 'home';
    function updateActiveNav(sectionId, fromClick) {
      if (!sectionId) return;
      _activeSection = sectionId;
      document.querySelectorAll('.pill').forEach(function(btn) {
        btn.classList.remove('is-active');
      });
      var target = document.querySelector('.pill[data-section="' + sectionId + '"]');
      if (target) {
        target.classList.add('is-active');
      }
      if (fromClick) {
        _scrollLock = true;
        clearTimeout(window._scrollLockTimer);
        window._scrollLockTimer = setTimeout(function() {
          _scrollLock = false;
        }, 1500);
      }
    }
    function getSectionFromScroll() {
      var scrollY = window.scrollY || window.pageYOffset || 0;
      var sections = ['home', 'projects', 'about'];
      var found = 'home';
      var threshold = 120;
      for (var i = 0; i < sections.length; i++) {
        var el = document.getElementById(sections[i]);
        if (!el) continue;
        var top = el.offsetTop - threshold;
        var bottom = top + el.offsetHeight;
        if (scrollY >= top && scrollY < bottom) {
          found = sections[i];
          break;
        }
        if (i === sections.length - 1 && scrollY >= top - 50) {
          found = sections[i];
        }
      }
      return found;
    }
    var _scrollTick = false;
    function onScrollUpdate() {
      if (_scrollLock) return;
      if (_scrollTick) return;
      _scrollTick = true;
      requestAnimationFrame(function() {
        var section = getSectionFromScroll();
        if (section && section !== _activeSection) {
          updateActiveNav(section, false);
        }
        _scrollTick = false;
      });
    }
    window.addEventListener('scroll', onScrollUpdate, { passive: true });
    function scrollToSection(id) {
      var target = document.getElementById(id);
      if (!target) return;
      updateActiveNav(id, true);
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      clearTimeout(window._scrollEndTimer);
      window._scrollEndTimer = setTimeout(function() {
        if (!_scrollLock) {
          var section = getSectionFromScroll();
          if (section) updateActiveNav(section, false);
        }
      }, 800);
    }
    function initNavHighlight() {
      var section = getSectionFromScroll();
      updateActiveNav(section, false);
    }
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      initNavHighlight();
    } else {
      document.addEventListener('DOMContentLoaded', initNavHighlight);
    }
    window.addEventListener('load', function() {
      setTimeout(initNavHighlight, 300);
    });
    var _resizeTimer;
    window.addEventListener('resize', function() {
      clearTimeout(_resizeTimer);
      _resizeTimer = setTimeout(initNavHighlight, 200);
    });
    // ============================================================
    // 3. 进度条 & Header 阴影
    // ============================================================
    (function() {
      var bar = document.getElementById('progressBar');
      function updateProgress() {
        var scrollTop = window.scrollY || window.pageYOffset || 0;
        var docHeight = document.documentElement.scrollHeight - window.innerHeight;
        var pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        bar.style.width = pct + '%';
        bar.classList.toggle('visible', scrollTop > 50);
      }
      window.addEventListener('scroll', updateProgress, { passive: true });
      window.addEventListener('resize', updateProgress, { passive: true });
      updateProgress();
    })();
    (function() {
      var header = document.getElementById('header');
      function updateHeader() {
        header.classList.toggle('scrolled', window.scrollY > 50);
      }
      window.addEventListener('scroll', updateHeader, { passive: true });

// 5. GSAP PillNav 悬停动画
    // ============================================================
    (function() {
      var pills = document.querySelectorAll('.pill');
      var tlRefs = [];
      function setupPill(pill, index) {
        var circle = pill.querySelector('.hover-circle');
        var label = pill.querySelector('.pill-label');
        var labelHover = pill.querySelector('.pill-label-hover');
        if (!circle) return;
        var rect = pill.getBoundingClientRect();
        var w = rect.width,
          h = rect.height;
        var R = ((w * w) / 4 + h * h) / (2 * h);
        var D = Math.ceil(2 * R) + 2;
        var delta = Math.ceil(R - Math.sqrt(Math.max(0, R * R - (w * w) / 4))) + 1;
        var originY = D - delta;
        circle.style.width = D + 'px';
        circle.style.height = D + 'px';
        circle.style.bottom = '-' + delta + 'px';
        gsap.set(circle, { xPercent: -50, scale: 0, opacity: 0, transformOrigin: '50% ' + originY + 'px' });
        if (label) gsap.set(label, { y: 0 });
        if (labelHover) gsap.set(labelHover, { y: h + 12, opacity: 0 });
        if (tlRefs[index]) tlRefs[index].kill();
        var tl = gsap.timeline({ paused: true });
        tl.to(circle, { scale: 1.2, opacity: 1, xPercent: -50, duration: 2, ease: 'power3.easeOut', overwrite: 'auto' },
        0);
        if (label) {
          tl.to(label, { y: -(h + 8), duration: 2, ease: 'power3.easeOut', overwrite: 'auto' }, 0);
        }
        if (labelHover) {
          gsap.set(labelHover, { y: Math.ceil(h + 100), opacity: 0 });
          tl.to(labelHover, { y: 0, opacity: 1, duration: 2, ease: 'power3.easeOut', overwrite: 'auto' }, 0);
        }
        tlRefs[index] = tl;
        pill._gsapEnter = function() {
          if (tlRefs[index]) {
            tlRefs[index].tweenTo(tlRefs[index].duration(), { duration: 0.3, ease: 'power3.easeOut' });
          }
        };
        pill._gsapLeave = function() {
          if (tlRefs[index]) {
            tlRefs[index].tweenTo(0, { duration: 0.2, ease: 'power3.easeOut' });
          }
        };
        pill.removeEventListener('mouseenter', pill._gsapEnter);
        pill.removeEventListener('mouseleave', pill._gsapLeave);
        pill.addEventListener('mouseenter', pill._gsapEnter);
        pill.addEventListener('mouseleave', pill._gsapLeave);
      }
      function layoutAll() {
        pills.forEach(function(pill, i) { setupPill(pill, i); });
      }
      layoutAll();
      window.addEventListener('resize', layoutAll);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(layoutAll).catch(function() {});
      }
    })();
   // ============================================================
    
  </script>

  (function() {
    var glow = document.getElementById('heroTextGlow');
    var text = document.getElementById('heroMainText');
    if (!glow || !text) return;
    var rafId = null, tx = 0, ty = 0, cx = -9999, cy = -9999;
    function setPos(x, y) {
      glow.style.left = x + 'px';
      glow.style.top = y + 'px';
    }
    function startGlow(e) {
      tx = e.clientX; ty = e.clientY;
      cx = tx; cy = ty;
      setPos(cx, cy);
      glow.style.opacity = '1';
    }
    text.addEventListener('mouseenter', startGlow);
    text.addEventListener('mousemove', function(e) {
      tx = e.clientX; ty = e.clientY;
      glow.style.opacity = '1';
      if (!rafId) {
        rafId = requestAnimationFrame(function fn() {
          cx += (tx - cx) * 0.12; cy += (ty - cy) * 0.12;
          setPos(cx, cy);
          if (Math.abs(cx - tx) > 0.5 || Math.abs(cy - ty) > 0.5) {
            rafId = requestAnimationFrame(fn);
          } else {
            setPos(tx, ty);
            rafId = null;
          }
        });
      }
    });
    text.addEventListener('mouseleave', function() {
      glow.style.opacity = '0';
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    });
  })();

 <script>

function sendToBack(card) {
